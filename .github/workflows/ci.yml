name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      bun-version: "1.3.11"
      test-command: "bun run test:all"
      lint-command: "bun run lint"
      typecheck-command: "bun run typecheck"
      enable-security: "true"
      osv-lockfile: "bun.lock"
      enable-l2: "false"
      enable-l3: "false"
      upload-coverage: "true"
      coverage-path: "packages/proxy/coverage"
    secrets: inherit
